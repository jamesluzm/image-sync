name: Sync K8s Images to Tencent
on: [push, workflow_dispatch] # 支持推代码触发，也支持在 GitHub 网页上手动点击按钮触发

jobs:
  sync-images:
    runs-on: ubuntu-latest
    steps:
    - name: Login to Tencent Registry
      run: |
        echo "${{ secrets.TENCENT_REGISTRY_PASSWORD }}" | docker login --username=${{ secrets.TENCENT_REGISTRY_USER }} --password-stdin ccr.ccs.tencentyun.com
    
    - name: Multi-Threaded Sync Images
      run: |
        # 1. 定义需要同步的镜像列表（源镜像 -> 腾讯云目标镜像）
        # 
        declare -A images=(
        # 修正后的 KServe 核心组件镜像路径（源路径变更为 Docker Hub）
          ["kserve/kserve-controller:v0.12.0"]="ccr.ccs.tencentyun.com/hahere-public/sync:kserve-controller-v0.12.0"
          ["kserve/storage-initializer:v0.12.0"]="ccr.ccs.tencentyun.com/hahere-public/sync:storage-initializer-v0.12.0"
          ["kserve/agent:v0.12.0"]="ccr.ccs.tencentyun.com/hahere-public/sync:agent-v0.12.0"       )

        # 2. 循环启动后台任务进行并发拉取、打标签和推送
        for src in "${!images[@]}"; do
          dst="${images[$src]}"
          (
            echo "Starting sync: $src -> $dst"
            docker pull "$src"
            docker tag "$src" "$dst"
            docker push "$dst"
            echo "Finished sync: $dst"
          ) &
        done

        # 3. 等待所有后台同步任务全部完成
        wait
        echo "All images synced successfully!"
